<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouncy Castle — Scan to Sign Waiver</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #fff7ed 0%, #fef3c7 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
    }
    .box {
      text-align: center;
      padding: 40px 48px;
      background: white;
      border-radius: 28px;
      box-shadow: 0 12px 60px rgba(0,0,0,0.12);
      max-width: 460px;
      width: 100%;
    }
    .emoji { font-size: 3.5rem; margin-bottom: 10px; }
    h1 { font-size: 1.8rem; font-weight: 800; color: #1a202c; margin-bottom: 4px; }
    .tagline { font-size: 0.95rem; color: #6b7280; margin-bottom: 28px; }

    #qr-wrap {
      display: flex; align-items: center; justify-content: center;
      width: 260px; height: 260px;
      margin: 0 auto 24px;
      border: 3px solid #f97316;
      border-radius: 16px;
      padding: 10px;
      background: white;
    }
    #qr-wrap canvas, #qr-wrap img { max-width: 100%; max-height: 100%; }

    .instruction {
      background: #fff7ed;
      border: 1.5px solid #fed7aa;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 0.88rem;
      color: #92400e;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .url-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }
    .url-row input {
      flex: 1;
      padding: 8px 10px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.78rem;
      color: #374151;
    }
    .url-row input:focus { outline: none; border-color: #f97316; }
    .url-row button {
      padding: 8px 14px;
      background: #f97316;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .url-row button:hover { background: #ea6c0a; }

    .hint { font-size: 0.72rem; color: #9ca3af; margin-bottom: 6px; }

    .print-btn {
      display: inline-block;
      margin-top: 6px;
      padding: 10px 24px;
      background: #f0fdf4;
      color: #166534;
      border: 1.5px solid #bbf7d0;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .print-btn:hover { background: #dcfce7; }

    @media print {
      body { background: white; }
      .box { box-shadow: none; border: 2px solid #e5e7eb; }
      .url-row, .hint, .print-btn { display: none !important; }
    }
  </style>

  <!-- qrcodejs: MIT License, loaded from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
          crossorigin="anonymous"
          onerror="loadFallbackQR()"></script>
</head>
<body>
  <div class="box">
    <div class="emoji">🏰</div>
    <h1>Bouncy Castle Waiver</h1>
    <p class="tagline">Parents must sign before children can bounce!</p>

    <div id="qr-wrap">
      <div id="qrcode"></div>
    </div>

    <div class="instruction">
      📱 <strong>Open your phone's camera</strong> and point it at the QR code,<br>
      then tap the link to open and sign the waiver.
    </div>

    <p class="hint">Waiver URL (edit if your IP is different):</p>
    <div class="url-row">
      <input type="text" id="url-input" placeholder="http://192.168.1.x:8080/waiver.html" />
      <button onclick="updateQR()">Update QR</button>
    </div>

    <button class="print-btn" onclick="window.print()">🖨️ Print this page</button>
  </div>

  <script>
    // Read URL from hash if provided (set by start.py when opening browser)
    const hashUrl = location.hash ? decodeURIComponent(location.hash.slice(1)) : null;

    // Try to guess a reasonable default local URL
    const guessedUrl = hashUrl
      || (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1'
          ? `${location.protocol}//${location.hostname}/waiver.html`
          : 'http://192.168.1.x:8080/waiver.html');

    document.getElementById('url-input').value = guessedUrl;

    let qrInstance = null;

    function makeQR(url) {
      const container = document.getElementById('qrcode');
      container.innerHTML = '';
      if (typeof QRCode !== 'undefined') {
        qrInstance = new QRCode(container, {
          text: url,
          width:  220,
          height: 220,
          colorDark:  '#1a202c',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.H,
        });
      } else {
        // Fallback: show URL as text with instructions
        container.innerHTML = `<div style="font-size:0.7rem;color:#6b7280;padding:10px;word-break:break-all;">
          QR library unavailable.<br><br>
          <strong>Direct URL:</strong><br>${url}</div>`;
      }
    }

    function updateQR() {
      const url = document.getElementById('url-input').value.trim();
      if (url) makeQR(url);
    }

    function loadFallbackQR() {
      // If CDN failed, show a message
      console.log('QR CDN unavailable — showing URL as text fallback.');
      const url = document.getElementById('url-input').value.trim() || guessedUrl;
      const container = document.getElementById('qrcode');
      container.innerHTML = `
        <div style="text-align:center;padding:10px;">
          <p style="font-size:0.7rem;color:#374151;margin-bottom:8px;">
            <strong>Type this URL on your phone:</strong>
          </p>
          <p style="font-size:0.75rem;color:#f97316;font-weight:700;word-break:break-all;">${url}</p>
        </div>`;
    }

    // Initial render
    makeQR(guessedUrl);
  </script>
</body>
</html>
