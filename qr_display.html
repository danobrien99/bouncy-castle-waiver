<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Winona Ave Block Party — Bouncy Castle Waiver</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #fff7ed 0%, #fef3c7 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
    }
    .box {
      text-align: center;
      padding: 40px 48px;
      background: white;
      border-radius: 28px;
      box-shadow: 0 12px 60px rgba(0,0,0,0.12);
      max-width: 460px;
      width: 100%;
    }
    .emoji { font-size: 3.5rem; margin-bottom: 10px; }
    h1 { font-size: 1.7rem; font-weight: 800; color: #1a202c; margin-bottom: 2px; }
    h2 { font-size: 1.1rem; font-weight: 600; color: #374151; margin-bottom: 4px; }
    .tagline { font-size: 0.9rem; color: #6b7280; margin-bottom: 28px; }

    #qr-wrap {
      display: flex; align-items: center; justify-content: center;
      width: 260px; height: 260px;
      margin: 0 auto 24px;
      border: 3px solid #f97316;
      border-radius: 16px;
      padding: 10px;
      background: white;
    }
    #qr-wrap img { width: 220px; height: 220px; display: block; }

    .instruction {
      background: #fff7ed;
      border: 1.5px solid #fed7aa;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 0.88rem;
      color: #92400e;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .url-text {
      font-size: 0.72rem;
      color: #9ca3af;
      word-break: break-all;
      margin-bottom: 16px;
    }

    .print-btn {
      display: inline-block;
      padding: 10px 24px;
      background: #f0fdf4;
      color: #166534;
      border: 1.5px solid #bbf7d0;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .print-btn:hover { background: #dcfce7; }

    @media print {
      body { background: white; }
      .box { box-shadow: none; border: 2px solid #e5e7eb; }
      .print-btn { display: none; }
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="emoji">🏰</div>
    <h1>Winona Ave Block Party</h1>
    <h2>Bouncy Castle Waiver</h2>
    <p class="tagline">Parents must sign before children can bounce!</p>

    <div id="qr-wrap">
      <img id="qr-img" alt="QR Code" />
    </div>

    <div class="instruction">
      📱 <strong>Open your phone's camera</strong> and point it at the QR code,<br>
      then tap the link to open and sign the waiver.
    </div>

    <p class="url-text" id="url-display"></p>

    <button class="print-btn" onclick="window.print()">🖨️ Print this page</button>
  </div>

  <script>
    const WAIVER_URL = 'https://bouncy-castle-waiver.vercel.app/waiver.html';

    document.getElementById('url-display').textContent = WAIVER_URL;

    // Use qrserver.com API to generate QR — simple, reliable, no JS library needed
    const encoded = encodeURIComponent(WAIVER_URL);
    document.getElementById('qr-img').src =
      `https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=4&data=${encoded}`;
  </script>
</body>
</html>
